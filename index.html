<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>بطاقة منتج احترافي</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="product-card">
        <img
          src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
          alt="سماعات رأس لاسلكية احترافية"
          class="product-img"
        />

        <div class="product-content">
          <h1 class="product-title">سماعة Quantum X</h1>
          <p class="product-desc">
            استمتع بتجربة صوتية محيطية خارقة مع ميزة عزل الضوضاء الفائق وعمر
            بطارية يدوم حتى 40 ساعة متواصلة.
          </p>

          <div class="product-tags">
            <span class="tag">لاسلكي</span>
            <span class="tag">محيطي 7.1</span>
            <span class="tag">شحن سريع</span>
          </div>

          <div class="product-footer">
            <a href="#" class="btn-buy">اشترِ الآن</a>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
